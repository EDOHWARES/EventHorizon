name: Backend Action Integration Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-action-integration-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-action-integration-tests.yml'

jobs:
  action-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend action integration tests
        run: npm run test:actions:integration --workspace=backend