version: '3.9'

services:
  mongo:
    image: mongo:7-jammy
    container_name: eventhorizon_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: eventhorizon
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: eventhorizon_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # All-in-one Jaeger image. Exposes:
  #   16686 — Jaeger UI
  #   4318  — OTLP/HTTP collector (default exporter target)
  #   14268 — Jaeger collector (when OTEL_EXPORTER=jaeger)
  # Start with `docker compose --profile observability up jaeger`.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: eventhorizon_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
      - "14268:14268"
    profiles:
      - observability
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventhorizon_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/eventhorizon
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      - mongo
      - redis
    networks:
      - app_network

  frontend:
    image: node:20-alpine
    container_name: eventhorizon_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host"
    environment:
      VITE_API_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:
  redis_data:
  frontend_modules:

networks:
  app_network:
    driver: bridge
